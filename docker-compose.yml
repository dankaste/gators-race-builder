# Local development database for the Neon serverless driver.
# `postgres` is a plain local Postgres; `neon-proxy` exposes Neon's HTTP `/sql`
# endpoint in front of it so @neondatabase/serverless works locally exactly as it
# does against Neon in production — no cloud account required.
#
#   docker compose up -d
#   npm run db:push && npm run db:seed
#
# DATABASE_URL: postgres://postgres:postgres@db.localtest.me:5432/main
# (db.localtest.me resolves to 127.0.0.1 via public DNS — no hosts edit needed.)
services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: main
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d main"]
      interval: 3s
      timeout: 3s
      retries: 10

  neon-proxy:
    image: ghcr.io/timowilhelm/local-neon-http-proxy:main
    environment:
      PG_CONNECTION_STRING: postgres://postgres:postgres@postgres:5432/main
    ports:
      - "4444:4444"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
